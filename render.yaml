services:
  - type: web
    name: saathi-ai-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEYS
        sync: false            # set in Render dashboard (secret)
      - key: CHROMA_PERSIST_DIR
        value: ./data/chroma
      - key: PYTHON_VERSION
        value: "3.11"
